name: Linux ARM

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-arm:
    # Native arm64 runner (free for public repos) — no cross-compile, no qemu.
    # One ARMv8.0 baseline binary runs on every supported core: unlike retsurf
    # (Servo profits from per-CPU builds), this app is bounded by wifi and
    # SD-card speed, and ring's crypto detects CPU extensions at runtime.
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config ca-certificates libsdl2-dev zip

      - name: Rust toolchain
        run: |
          set -eux
          # rust-toolchain.toml pins the channel; rustup honors it.
          rustup show
          rustc --version

      - name: Build
        env:
          # CI performance build (kept out of Cargo.toml so local release
          # builds stay fast to compile). No -C target-cpu: the binary must
          # run on any ARMv8.0+ core (A35/A53/A55...).
          CARGO_PROFILE_RELEASE_LTO: "fat"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
        run: |
          set -eux
          cargo build --release

      - name: Stage binary
        run: |
          set -eux
          mkdir -p dist
          cp target/release/localsend-retro dist/
          strip dist/localsend-retro || true
          ls -la dist/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: localsend-retro-linux-aarch64
          path: dist/localsend-retro

      - name: Package for PortMaster
        run: |
          set -eux
          pm=portmaster-dist
          rm -rf "$pm"
          mkdir -p "$pm/localsend-retro"
          # Only the launcher sits at the port root; everything else lives in
          # the localsend-retro/ gamedir, matching installed-port layout.
          cp "portmaster/LocalSend Retro.sh" "$pm/"
          cp portmaster/port.json "$pm/localsend-retro/"
          cp portmaster/gameinfo.xml "$pm/localsend-retro/"
          cp portmaster/README.md "$pm/localsend-retro/"
          cp portmaster/screenshot.png "$pm/localsend-retro/"
          cp -r portmaster/localsend-retro/. "$pm/localsend-retro/"
          rm -f "$pm/localsend-retro/.gitkeep"
          cp dist/localsend-retro "$pm/localsend-retro/"
          chmod +x "$pm/LocalSend Retro.sh" "$pm/localsend-retro/localsend-retro"
          ls -laR "$pm"

      - name: Upload PortMaster artifact
        uses: actions/upload-artifact@v4
        with:
          name: localsend-retro-portmaster
          path: portmaster-dist

      - name: Zip for release
        if: github.event_name == 'release'
        run: |
          set -eux
          cd portmaster-dist && zip -r ../localsend-retro-portmaster.zip .
          cd ..
          sha256sum localsend-retro-portmaster.zip > localsend-retro-portmaster.zip.sha256
          cd dist && zip ../localsend-retro-linux-aarch64.zip localsend-retro
          cd ..
          sha256sum localsend-retro-linux-aarch64.zip > localsend-retro-linux-aarch64.zip.sha256

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            localsend-retro-portmaster.zip
            localsend-retro-portmaster.zip.sha256
            localsend-retro-linux-aarch64.zip
            localsend-retro-linux-aarch64.zip.sha256
